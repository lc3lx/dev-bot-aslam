# =========================
# neuria.dev -> www.neuria.dev (HTTPS)
# =========================
server {
    listen 80;
    listen [::]:80;
    server_name neuria.dev www1.neuria.dev;

    return 301 https://www.neuria.dev$request_uri;
}

# =========================
# www over HTTP -> HTTPS
# =========================
server {
    listen 80;
    listen [::]:80;
    server_name www.neuria.dev;

    return 301 https://www.neuria.dev$request_uri;
}

# =========================
# Main app server (Flask bot on 5000)
# =========================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name www.neuria.dev;

    # CloudPanel SSL
    {{ssl_certificate_key}}
    {{ssl_certificate}}

    # IMPORTANT: adjust if your project is in a different directory
    root /home/cloudpanel/htdocs/www.neuria.dev;
    index index.html;

    {{nginx_access_log}}
    {{nginx_error_log}}

    # =========================
    # Security headers
    # =========================
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # =========================
    # Allow Let's Encrypt
    # =========================
    location ^~ /.well-known/acme-challenge/ {
        root /home/cloudpanel/htdocs/www.neuria.dev;
        allow all;
    }

    # =========================
    # Optional: serve /public/* directly from disk
    # =========================
    location ^~ /public/ {
        alias /home/cloudpanel/htdocs/www.neuria.dev/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # =========================
    # Flask app (all routes, including /api/*)
    # =========================
    location / {
        proxy_pass http://127.0.0.1:5000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # =========================
    # Block sensitive files
    # =========================
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* /(app\.py|requirements\.txt|\.env) {
        deny all;
    }

    include /etc/nginx/global_settings;
}
